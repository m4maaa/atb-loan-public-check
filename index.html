<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATB Loan Public Check</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <main class="page">
    <section id="appCard" class="app-card status-green">
      <header class="app-header">
        <div>
          <div class="eyebrow">ATB Loan Public Check</div>
          <h1>ตรวจสอบการกู้ อทบ.</h1>
        </div>
        <button id="resetBtn" class="reset-btn" type="button">รีเซ็ต</button>
      </header>

      <section class="section-box">
        <h2>ข้อมูลเงินเดือน</h2>
        <div class="grid grid-4 salary-top-grid">
          <label class="field">
            <span>ระดับ</span>
            <select id="salaryLevel"></select>
          </label>
          <label class="field">
            <span>ขั้น</span>
            <select id="salaryStep"></select>
          </label>
          <label class="field">
            <span>เงินเดือน</span>
            <input id="salaryAmount" type="text" readonly />
          </label>
          <label class="field">
            <span>เดือน</span>
            <input id="latestMonth" type="text" readonly />
          </label>
        </div>

        <div class="grid grid-3">
          <label class="field">
            <span>รวมรับ</span>
            <input id="totalIncome" type="text" inputmode="decimal" autocomplete="off" placeholder="0.0" />
          </label>
          <label class="field">
            <span>รวมหัก</span>
            <input id="totalDeductions" type="text" inputmode="decimal" autocomplete="off" placeholder="0.0" />
          </label>
          <label class="field">
            <span>คงเหลือรับ</span>
            <input id="remainingIncome" type="text" readonly />
          </label>
        </div>
      </section>

      <section class="section-box section-loan">
        <h2>ขออนุมัติกู้</h2>

        <div class="grid loan-grid-top">
          <label class="field">
            <span>เงินฝาก</span>
            <input id="depositAmount" type="text" inputmode="decimal" autocomplete="off" placeholder="0.0" />
          </label>
          <label class="field field-wide">
            <span>กู้เกินเงินฝาก</span>
            <select id="overDepositMode"></select>
          </label>
        </div>

        <div class="grid loan-grid-bottom">
          <label class="field">
            <span>รวมกู้</span>
            <input id="totalLoanAmount" type="text" readonly />
          </label>
          <label class="field">
            <span>จำนวนงวด</span>
            <select id="termMonths"></select>
          </label>
          <label class="field">
            <span>ผ่อนต่อเดือน</span>
            <input id="monthlyPayment" type="text" readonly />
          </label>
        </div>

        <div class="grid grid-1 loan-sub-grid">
          <div class="debt-toggle-wrap">
            <label class="debt-toggle">
              <span>กู้ทับหนี้เดิม</span>
              <input id="hasOldDebt" type="checkbox" />
            </label>
          </div>
        </div>

        <div id="oldDebtSection" class="old-debt-section hidden">
          <div class="grid grid-3">
            <label class="field">
              <span>ยอดขอกู้</span>
              <input id="oldDebtRequested" type="text" inputmode="decimal" autocomplete="off" placeholder="0.0" />
            </label>
            <label class="field">
              <span>ยอดปัจจุบัน</span>
              <input id="oldDebtCurrent" type="text" inputmode="decimal" autocomplete="off" placeholder="0.0" />
            </label>
            <label class="field">
              <span>ยอดผ่อนต่อเดือน</span>
              <input id="oldDebtInstallment" type="text" inputmode="decimal" autocomplete="off" placeholder="0.0" />
            </label>
          </div>
          <div class="grid grid-1">
            <label class="field">
              <span>เหลือรับส่วนต่าง</span>
              <input id="differenceAmount" type="text" readonly />
            </label>
          </div>
        </div>
      </section>

      <section class="section-box">
        <h2>หลักเกณฑ์</h2>
        <div class="grid grid-3">
          <label class="field">
            <span>ยอด 1 ใน 3</span>
            <input id="oneThirdAmount" type="text" readonly />
          </label>
          <label class="field">
            <span>เหลือรับหลังกู้</span>
            <input id="remainingAfterLoan" type="text" readonly />
          </label>
          <label class="field">
            <span>จำนวนคนค้ำ</span>
            <input id="guarantorCount" type="text" readonly />
          </label>
        </div>
      </section>
    </section>
  </main>

  <script src="./js/salary.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
